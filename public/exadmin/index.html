<!-- WebSocket Push Manager - Inline Version -->
<script>
    (function () {
        'use strict';

        class PushManager {
            constructor() {
                this.connection = null;
                this.scriptLoaded = false;
                this.scriptLoading = false;
                this.scriptPromise = null;
                this.channels = new Map();
                this.wsUrl = null;
                this.appKey = '20f94408fc4c52845f162e92a253c7a3';
                this.authUrl = '/plugin/webman/push/auth';
            }

            loadScript() {
                if (this.scriptLoaded) {
                    return Promise.resolve();
                }

                if (this.scriptLoading) {
                    return this.scriptPromise;
                }

                this.scriptLoading = true;
                this.scriptPromise = new Promise((resolve, reject) => {
                    var script = document.createElement('script');
                    script.src = '/plugin/webman/push/push.js';
                    script.onload = () => {
                        this.scriptLoaded = true;
                        this.scriptLoading = false;
                        console.log('[PushManager] Push.js loaded successfully');
                        resolve();
                    };
                    script.onerror = () => {
                        this.scriptLoading = false;
                        var error = new Error('Failed to load push.js');
                        console.error('[PushManager]', error);
                        reject(error);
                    };
                    document.head.appendChild(script);
                });

                return this.scriptPromise;
            }

            async init(wsUrl) {
                if (this.connection && this.wsUrl === wsUrl) {
                    return this.connection;
                }

                if (this.connection && this.wsUrl !== wsUrl) {
                    console.warn('[PushManager] WebSocket URL changed, disconnecting old connection');
                    this.disconnect();
                }

                try {
                    await this.loadScript();

                    this.wsUrl = wsUrl;
                    this.connection = new Push({
                        url: this.wsUrl,
                        app_key: this.appKey,
                        auth: this.authUrl
                    });

                    console.log('[PushManager] WebSocket connection created');
                    return this.connection;
                } catch (error) {
                    console.error('[PushManager] Init failed:', error);
                    throw error;
                }
            }

            subscribe(channelName, messageHandler, context) {
                context = context || null;

                if (!this.connection) {
                    console.error('[PushManager] No connection available, call init() first');
                    return null;
                }

                if (this.channels.has(channelName)) {
                    var existingChannel = this.channels.get(channelName);
                    if (messageHandler) {
                        existingChannel.handlers.push({handler: messageHandler, context: context});
                    }
                    return existingChannel.channel;
                }

                try {
                    var channel = this.connection.subscribe(channelName);

                    var channelInfo = {
                        channel: channel,
                        handlers: messageHandler ? [{handler: messageHandler, context: context}] : []
                    };
                    this.channels.set(channelName, channelInfo);

                    if (messageHandler) {
                        channel.on('message', (data) => {
                            channelInfo.handlers.forEach(function (item) {
                                try {
                                    if (item.context) {
                                        item.handler.call(item.context, data);
                                    } else {
                                        item.handler(data);
                                    }
                                } catch (error) {
                                    console.error('[PushManager] Message handler error:', error);
                                }
                            });
                        });
                    }

                    console.log('[PushManager] Channel subscribed:', channelName);
                    return channel;
                } catch (error) {
                    console.error('[PushManager] Subscribe failed:', channelName, error);
                    return null;
                }
            }

            unsubscribe(channelName, messageHandler) {
                if (!this.channels.has(channelName)) {
                    return;
                }

                var channelInfo = this.channels.get(channelName);

                if (messageHandler) {
                    channelInfo.handlers = channelInfo.handlers.filter(function (item) {
                        return item.handler !== messageHandler;
                    });

                    if (channelInfo.handlers.length > 0) {
                        return;
                    }
                }

                try {
                    if (channelInfo.channel && typeof channelInfo.channel.unsubscribe === 'function') {
                        channelInfo.channel.unsubscribe();
                    }
                    this.channels.delete(channelName);
                    console.log('[PushManager] Channel unsubscribed:', channelName);
                } catch (error) {
                    console.error('[PushManager] Unsubscribe failed:', channelName, error);
                }
            }

            disconnect() {
                if (!this.connection) {
                    return;
                }

                var self = this;
                try {
                    this.channels.forEach(function (channelInfo) {
                        try {
                            if (channelInfo.channel && typeof channelInfo.channel.unsubscribe === 'function') {
                                channelInfo.channel.unsubscribe();
                            }
                        } catch (error) {
                            console.error('[PushManager] Unsubscribe channel failed:', error);
                        }
                    });
                    this.channels.clear();

                    if (typeof this.connection.disconnect === 'function') {
                        this.connection.disconnect();
                    }
                    this.connection = null;
                    this.wsUrl = null;

                    console.log('[PushManager] Disconnected');
                } catch (error) {
                    console.error('[PushManager] Disconnect failed:', error);
                }
            }

            isConnected() {
                return this.connection !== null;
            }

            getChannels() {
                return Array.from(this.channels.keys());
            }
        }

        // 创建单例实例
        var pushManagerInstance = new PushManager();

        // 挂载到全局 window 对象
        window.$pushManager = pushManagerInstance;
        console.log('[PushManager] Mounted to window.$pushManager');

        // 尝试自动注入到 Vue
        function installToVue() {
            // Vue 2
            if (typeof window.Vue !== 'undefined' && window.Vue.prototype) {
                window.Vue.prototype.$pushManager = pushManagerInstance;
                console.log('[PushManager] Auto-installed to Vue 2');
                return true;
            }

            // Vue 3
            if (typeof window.Vue !== 'undefined' && window.Vue.config) {
                if (window.Vue.config.globalProperties) {
                    window.Vue.config.globalProperties.$pushManager = pushManagerInstance;
                    console.log('[PushManager] Auto-installed to Vue 3');
                    return true;
                }
            }

            return false;
        }

        // 立即尝试安装
        var installed = installToVue();

        // 如果安装失败，等待 Vue 加载
        if (!installed) {
            console.log('[PushManager] Vue not found, waiting...');

            var attempts = 0;
            var maxAttempts = 100;

            var checkVue = setInterval(function () {
                attempts++;

                if (installToVue()) {
                    clearInterval(checkVue);
                } else if (attempts >= maxAttempts) {
                    clearInterval(checkVue);
                    console.warn('[PushManager] Vue not found after 10s, but window.$pushManager is still available');
                }
            }, 100);
        }

        // 同时监听 DOMContentLoaded 事件
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function () {
                setTimeout(function () {
                    installToVue();
                }, 500);
            });
        }
    })();
</script>
